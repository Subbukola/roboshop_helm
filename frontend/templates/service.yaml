---
apiVersion: v1
kind: Service
metadata:  
  name: frontend
  namespace: roboshop 
  labels:
    env: dev
    component: frontend
    project: roboshop

spec:
  type: {{ .Values.service.service_type}}
  selector:
    env: dev
    component: frontend
    project: roboshop
  ports:
    - targetPort: 80
      port: 80
      protocol: TCP

