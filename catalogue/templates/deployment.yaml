apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: catalogue 
  namespace: roboshop
  labels:
    env: dev
    component: catalogue 
    project: roboshop

spec:
  replicas: {{ .Values.deployment.replicas}}
  selector:
    matchLabels:
      env: dev
      component: catalogue
      project: roboshop
  template:
    metadata:
      labels:
        env: dev
        component: catalogue 
        project: roboshop
    spec:
      containers:
        - name: catalogue 
          image: subbukola541/{{ .Values.deployment.image_name}}:{{ .Values.deployment.image_version}}
          imagePullPolicy: Always
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "300Mi"
              cpu: "1000m"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 2          
              
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 2
            initialDelaySeconds: 20
          
          
          envFrom:
            - configMapRef:
                name: catalogue


          
