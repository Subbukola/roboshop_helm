
apiVersion: v1
kind: Service
metadata:  
  name: {{ .Values.service.name}}        
  namespace: roboshop 
  labels:
    env: dev
    component: mongodb
    project: roboshop

spec:
  selector:
    env: dev
    component: mongodb
    project: roboshop
  ports:
    - targetPort: 27017 
      port: 27017 
      protocol: TCP

      
